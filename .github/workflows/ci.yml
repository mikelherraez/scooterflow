name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: scooterflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://admin:1234@127.0.0.1:5432/scooterflow
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esperar a que PostgreSQL esté listo
        run: |
          for i in {1..20}; do
            pg_isready -h 127.0.0.1 -p 5432 -U admin && break
            echo "Intento $i/20: PostgreSQL aún no disponible..."
            sleep 2
          done

      - name: Ejecutar migraciones Alembic
        run: alembic upgrade head

      - name: Ejecutar tests
        run: pytest
