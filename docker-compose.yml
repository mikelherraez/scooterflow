version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: scooterflow_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: scooterflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d scooterflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: scooterflow_api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:1234@db:5432/scooterflow
      PYTHONPATH: /code
    volumes:
      - ./app:/code/app          
      - ./migrations:/code/migrations  

volumes:
  db_data:
